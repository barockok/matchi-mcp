name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'skills/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp README.md _site/index.md
          cat > _site/_config.yml <<'YAML'
          theme: jekyll-theme-cayman
          title: matchi
          description: Dataset reconciliation tools (DuckDB-backed daemon) for any MCP-compatible agentic harness.
          YAML
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: _site
          destination: _build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _build
      - id: deployment
        uses: actions/deploy-pages@v4
